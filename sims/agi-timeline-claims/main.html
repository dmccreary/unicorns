<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>AGI Timeline Claims vs Actual Milestones</title>
    <link rel="stylesheet" href="https://unpkg.com/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>
</head>
<body>
    <main>
        <h2>AGI Timeline Claims vs Actual Milestones</h2>
        <div id="timeline"></div>
        <div id="legend">
            <span class="legend-item"><span class="legend-dot" style="background:#E67E22;"></span> Predictions</span>
            <span class="legend-item"><span class="legend-dot" style="background:#2E86C1;"></span> Achievements</span>
        </div>
    </main>
    <br/>
    <a href=".">Back to Lesson Plan</a>

    <script>
    fetch('timeline.json')
        .then(response => response.json())
        .then(data => {
            var groups = new vis.DataSet(data.groups);
            var items = new vis.DataSet(data.items);
            var container = document.getElementById('timeline');
            var options = {
                zoomable: false,
                moveable: true,
                showCurrentTime: false,
                tooltip: { followMouse: true },
                margin: { item: 10 },
                orientation: { axis: 'bottom' },
                min: new Date(1950, 0, 1),
                max: new Date(2040, 0, 1),
                height: '400px'
            };
            var timeline = new vis.Timeline(container, items, groups, options);
        });
    </script>
</body>
</html>
