site_name: Unicorns and Other Mythical Beasts
repo_url: https://github.com/dmccreary/unicorns
site_url: https://dmccreary.github.io/unicorns/
site_description: An interactive intelligent textbook about unicorns, mythical beasts, and the technologies that will improve them. A satirical exploration of AI hype, education resistance, and technology fantasies.
site_author: Dan McCreary

nav:
  - Home: index.md
  - About: about.md
  - Course Description: course-description.md
  - Chapters:
    - Overview: chapters/index.md
    - 1. History of Unicorns: chapters/01-history-of-unicorns/index.md
    - 2. Taxonomy of Mythical Beasts: chapters/02-taxonomy-of-mythical-beasts/index.md
    - 3. The Unicorn-Industrial Complex: chapters/03-unicorn-industrial-complex/index.md
    - 4. The Emperor's New Algorithm: chapters/04-emperors-new-algorithm/index.md
    - 5. Deer in the Headlights: chapters/05-deer-in-the-headlights/index.md
    - 6. The Ostrich Academy: chapters/06-the-ostrich-academy/index.md
    - 7. The Job Thief: chapters/07-the-job-thief/index.md
    - 8. Centaur Workforce: chapters/08-centaur-workforce/index.md
    - 9. Phoenix Rising: chapters/09-phoenix-rising/index.md
    - 10. Siren Song of Automation: chapters/10-siren-song-of-automation/index.md
    - 11. Unicorn Spotting: chapters/11-unicorn-spotting/index.md
    - 12. Breeding Better Unicorns: chapters/12-breeding-better-unicorns/index.md
    - 13. Grand Council of Beasts: chapters/13-grand-council-of-mythical-beasts/index.md
    - 14. The Last Textbook: chapters/14-the-last-textbook/index.md
    - 15. Quantum Computing: chapters/15-quantum-computing/index.md
    - 16. Efficient Blockchain: chapters/16-efficient-blockchain/index.md
    - 17. Ethical Bitcoin: chapters/17-ethical-bitcoin/index.md
    - 18. The Metaverse: chapters/18-the-metaverse/index.md
    - 19. Bestiary of Vaporware: chapters/19-bestiary-of-vaporware/index.md
  - Stories:
    - Overview: stories/index.md
    - Deer in the Headlights: stories/deer-in-the-headlights/index.md
    - The Ostrich Principal: stories/the-ostrich-principal/index.md
    - Dragon Layoffs: stories/dragon-layoffs/index.md
    - The Unicorn Startup: stories/the-unicorn-startup/index.md
  - MicroSims:
    - Graph Viewer: sims/graph-viewer/index.md
  - Learning Graph:
    - Introduction: learning-graph/index.md
    - Course Description Assessment: learning-graph/course-description-assessment.md
    - Concept Enumeration: learning-graph/concept-list.md
    - Graph Quality Analysis: learning-graph/quality-metrics.md
    - Concept Taxonomy: learning-graph/concept-taxonomy.md
    - Taxonomy Distribution Report: learning-graph/taxonomy-distribution.md
    - Mascot Test: learning-graph/mascot-test.md
  - License: license.md
  - Contact: contact.md

theme:
  name: material
  palette:
    primary: 'purple'
    accent: 'pink'
  logo: img/logo.png
  favicon: img/favicon.ico
  include_sidebar: true
  features:
    - content.code.copy
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - toc.follow
    - navigation.top
    - navigation.footer
    - content.action.edit

plugins:
  - search
  - social
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
      auto_caption: false
      caption_position: bottom

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - footnotes
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      linenums: true

extra_css:
  - css/extra.css
  - css/mascot.css

extra_javascript:
  - js/extra.js

watch:
  - docs
  - mkdocs.yml

exclude_docs: |
  img/mascot/README.md

copyright: Copyright &copy; 2025 Dan McCreary. Licensed under <a href="license/">CC BY-NC-SA 4.0</a> for non-commercial use.

extra:
  generator: false
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: Unicorns and Other Mythical Beasts
  textbook_version: "1.0"
