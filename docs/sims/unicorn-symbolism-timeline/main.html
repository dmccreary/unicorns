<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Timeline of Unicorns in History</title>
    <link rel="stylesheet" href="https://unpkg.com/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>
</head>
<body>
    <main>
        <h2>Timeline of Unicorns in History</h2>
        <div id="legend">
            <span class="legend-item"><span class="legend-dot" style="background:#DAA520;"></span> Ancient</span>
            <span class="legend-item"><span class="legend-dot" style="background:#DC143C;"></span> Medieval</span>
            <span class="legend-item"><span class="legend-dot" style="background:#008080;"></span> Modern</span>
            <span class="legend-item"><span class="legend-dot" style="background:#800080;"></span> Tech Era</span>
        </div>
        <div id="timeline"></div>
    </main>
    <br/>
    <a href=".">Back to Lesson Plan</a>

    <script>
    fetch('timeline.json')
        .then(response => response.json())
        .then(data => {
            var groups = new vis.DataSet(data.groups);
            var items = new vis.DataSet(data.items);
            var container = document.getElementById('timeline');
            var options = {
                zoomable: false,
                movable: true,
                showCurrentTime: false,
                tooltip: { followMouse: true, overflowMethod: 'cap' },
                margin: { item: 10 },
                orientation: { axis: 'bottom' },
                min: new Date(-3200, 0, 1),
                max: new Date(2800, 0, 1),
                start: new Date(-3000, 0, 1),
                end: new Date(1700, 0, 1),
                height: '450px',
                groupOrder: 'id',
                showMajorLabels: true,
                showMinorLabels: true
            };
            var timeline = new vis.Timeline(container, items, groups, options);

            // Prevent vertical scroll hijacking — let page scroll normally
            container.addEventListener('wheel', function(e) {
                if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
                    e.stopImmediatePropagation();
                }
            }, true);
        });
    </script>
</body>
</html>
